  <style>
    :root{--bg:#050505;--paper:#e8e4db;--muted:rgba(232,228,219,.55);--line:rgba(232,228,219,.12);--red:#8d2418;}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--bg);color:var(--paper);font-family:Pretendard,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    .nav{position:fixed;top:0;left:0;right:0;z-index:20;display:grid;grid-template-columns:170px 1fr;align-items:start;padding:28px 38px 42px;background:linear-gradient(to bottom,rgba(5,5,5,.30),rgba(5,5,5,.12),rgba(5,5,5,0));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .logo{color:var(--paper);text-decoration:none;font-size:26px;font-weight:950;letter-spacing:-.08em;line-height:.86}.links{display:flex;justify-content:flex-end;gap:34px}.links a{position:relative;color:rgba(232,228,219,.62);text-decoration:none;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.links a.active,.links a:hover{color:var(--paper)}
    .wrap{width:min(1200px,100%);margin:0 auto;padding:150px 36px 80px}.eyebrow{display:block;margin-bottom:22px;color:var(--muted);font-size:13px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}.hero{border-top:1px solid var(--line);padding-top:34px;margin-bottom:34px}.hero h1{margin:0;font-size:clamp(56px,10vw,128px);line-height:.83;letter-spacing:-.095em;font-weight:950}
    .stage{position:relative;min-height:620px;border:1px solid var(--line);background:#020202;overflow:hidden;display:grid;place-items:center}.stage-label{position:absolute;left:24px;top:22px;z-index:2;color:rgba(232,228,219,.50);font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}.kinetic-img{display:block;width:100%;height:100%;min-height:620px;object-fit:cover;object-position:center;filter:none;opacity:1;mix-blend-mode:normal}.next{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.next a{border:1px solid var(--line);padding:16px 14px;color:rgba(232,228,219,.68);text-decoration:none;font-size:12px;font-weight:850;letter-spacing:.04em}.next a:hover{color:var(--paper);border-color:rgba(141,36,24,.75)}
    @media(max-width:760px){.nav{grid-template-columns:1fr;gap:16px;padding:20px}.links{justify-content:flex-start;gap:18px;overflow-x:auto}.wrap{padding:120px 18px 56px}.stage{min-height:430px}.kinetic-img{min-height:430px}.next{grid-template-columns:1fr 1fr}.hero h1{font-size:64px}}

    /* Kinetic detail visibility hard fix */
    .stage::before,.stage::after{content:none!important;display:none!important;background:none!important;opacity:0!important;}
    .stage{isolation:isolate!important;background:#020202!important;}
    .stage .kinetic-img{position:relative!important;z-index:1!important;opacity:1!important;visibility:visible!important;filter:none!important;mix-blend-mode:normal!important;}
